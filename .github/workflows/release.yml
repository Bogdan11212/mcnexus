name: Create Release & Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write  # Обязательно для Trusted Publishing на PyPI

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Build package
        run: |
          pip install build
          python -m build
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.whl
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Токен не нужен при использовании Trusted Publishing
          skip-existing: true
